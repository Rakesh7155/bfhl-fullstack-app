<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Parser Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --surface-color: #1a1f2e;
            --primary-gradient: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --error-color: #ef4444;
            --success-color: #10b981;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            display: flex;
            min-height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .background-blobs {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            filter: blur(100px);
            opacity: 0.4;
            border-radius: 50%;
            animation: float 20s infinite ease-in-out alternate;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: #6366f1;
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: #ec4899;
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(50px, 50px) scale(1.1);
            }
        }

        .container {
            position: relative;
            z-index: 1;
            background: rgba(26, 31, 46, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        h1 {
            font-size: 2.5rem;
            margin-top: 0;
            margin-bottom: 10px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }

        label {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        input[type="text"]:focus {
            border-color: #a855f7;
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2);
            background: rgba(0, 0, 0, 0.5);
        }

        button {
            padding: 16px 30px;
            border: none;
            border-radius: 12px;
            background: var(--primary-gradient);
            color: white;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
            box-shadow: 0 10px 20px -10px rgba(168, 85, 247, 0.5);
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .result-container {
            display: none;
            margin-top: 30px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .result-title {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            background: rgba(16, 185, 129, 0.2);
            color: var(--success-color);
        }

        .status-badge.error {
            background: rgba(239, 68, 68, 0.2);
            color: var(--error-color);
        }

        pre {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            overflow-x: auto;
            color: #e2e8f0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* Syntax Highlighting */
        .string {
            color: #a5b4fc;
        }

        .number {
            color: #fca5a5;
        }

        .boolean {
            color: #6ee7b7;
        }

        .null {
            color: #fcd34d;
        }

        .key {
            color: #f472b6;
            font-weight: 600;
        }

        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        button.loading span {
            display: none;
        }

        button.loading .loader {
            display: block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
                margin: 20px;
            }

            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <h1>Graph Parser Pro</h1>
        <p class="subtitle">Transform flat edge relationships into hierarchical trees.</p>

        <div class="input-group">
            <label for="edges-input">Enter Edges (comma separated)</label>
            <input type="text" id="edges-input" placeholder="e.g. A->B, A->C, B->D, X->Y, Y->Z" autocomplete="off"
                spellcheck="false" />
            <button id="submit-btn">
                <span>Parse Hierarchies</span>
                <div class="loader"></div>
            </button>
        </div>

        <div class="result-container" id="result-container">
            <div class="result-header">
                <div class="result-title">Response payload</div>
                <div class="status-badge" id="status-badge">Success</div>
            </div>
            <pre id="json-output"></pre>
        </div>
    </div>

    <script>
        document.getElementById('submit-btn').addEventListener('click', async () => {
            const inputVal = document.getElementById('edges-input').value;
            const btn = document.getElementById('submit-btn');
            const resultContainer = document.getElementById('result-container');
            const jsonOutput = document.getElementById('json-output');
            const statusBadge = document.getElementById('status-badge');

            // Quick sanitation to arrays
            const edges = inputVal.split(',').map(s => s.trim()).filter(s => s.length > 0);

            // UI loading state
            btn.classList.add('loading');
            btn.disabled = true;
            resultContainer.style.display = 'none';

            try {
                // In production this might be a full URL if decoupled. For now relative path is used assuming serving from /
                const response = await fetch('/bfhl', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: edges })
                });

                const data = await response.json();

                if (response.ok) {
                    statusBadge.textContent = 'Success - ' + response.status;
                    statusBadge.className = 'status-badge';
                } else {
                    statusBadge.textContent = 'Error - ' + response.status;
                    statusBadge.className = 'status-badge error';
                }

                jsonOutput.innerHTML = syntaxHighlight(JSON.stringify(data, null, 2));
                resultContainer.style.display = 'block';

            } catch (err) {
                statusBadge.textContent = 'Network Error';
                statusBadge.className = 'status-badge error';
                jsonOutput.innerHTML = syntaxHighlight(JSON.stringify({ error: err.message }, null, 2));
                resultContainer.style.display = 'block';
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        });

        function syntaxHighlight(json) {
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                let cls = 'number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'key';
                    } else {
                        cls = 'string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'boolean';
                } else if (/null/.test(match)) {
                    cls = 'null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        // Allow hitting Enter to submit
        document.getElementById('edges-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                document.getElementById('submit-btn').click();
            }
        });
    </script>
</body>

</html>
